services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: efratagro_postgres
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-sis_efratagro}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - efratagro_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sis_efratagro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Backend — Node.js + Express
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    container_name: efratagro_backend
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:${PORT:-3002}"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - efratagro_net

  # ---------------------------------------------------------------------------
  # Frontend — React + Vite
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
    container_name: efratagro_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: /api
      VITE_API_PROXY_TARGET: http://backend:${PORT:-3002}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - efratagro_net

volumes:
  pgdata:
    name: efratagro_pgdata
  backend_node_modules:
    name: efratagro_backend_node_modules
  frontend_node_modules:
    name: efratagro_frontend_node_modules

networks:
  efratagro_net:
    name: efratagro_net
    driver: bridge
